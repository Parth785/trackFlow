<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">

  <!-- ═══ SHADOW ═══ -->
  <ellipse cx="50" cy="126" rx="22" ry="4" fill="black" opacity="0.12"/>

  <!-- ═══ REAR WHEEL ═══ -->
  <ellipse cx="50" cy="112" rx="13" ry="5.5" fill="#1a1a1a"/>
  <ellipse cx="50" cy="112" rx="8" ry="3.5" fill="#333"/>
  <ellipse cx="50" cy="112" rx="3" ry="1.5" fill="#555"/>

  <!-- ═══ DELIVERY BOX (behind rider) ═══ -->
  <rect x="33" y="78" width="34" height="28" rx="5" fill="#FF8F00"/>
  <!-- Box lid -->
  <rect x="33" y="78" width="34" height="7" rx="5" fill="#E65100"/>
  <!-- Box straps -->
  <line x1="50" y1="85" x2="50" y2="106" stroke="#BF360C" stroke-width="1.5" opacity="0.6"/>
  <line x1="33" y1="95" x2="67" y2="95" stroke="#BF360C" stroke-width="1.5" opacity="0.6"/>
  <!-- Box corners -->
  <circle cx="37" cy="82" r="2" fill="#BF360C" opacity="0.5"/>
  <circle cx="63" cy="82" r="2" fill="#BF360C" opacity="0.5"/>

  <!-- ═══ SCOOTER REAR BODY ═══ -->
  <path d="M39 75 Q39 68 50 68 Q61 68 61 75 L61 80 Q61 84 50 84 Q39 84 39 80 Z"
        fill="#D32F2F"/>

  <!-- ═══ RIDER LOWER BODY / LEGS ═══ -->
  <!-- Left leg -->
  <path d="M40 60 Q36 65 36 72" stroke="#1565C0" stroke-width="7"
        stroke-linecap="round" fill="none"/>
  <!-- Right leg -->
  <path d="M60 60 Q64 65 64 72" stroke="#1565C0" stroke-width="7"
        stroke-linecap="round" fill="none"/>
  <!-- Left shoe -->
  <ellipse cx="36" cy="73" rx="5" ry="3" fill="#111"/>
  <!-- Right shoe -->
  <ellipse cx="64" cy="73" rx="5" ry="3" fill="#111"/>

  <!-- ═══ SCOOTER MIDDLE / FOOTBOARD ═══ -->
  <rect x="36" y="60" width="28" height="10" rx="3" fill="#B71C1C"/>

  <!-- ═══ RIDER TORSO ═══ -->
  <ellipse cx="50" cy="50" rx="14" ry="12" fill="#1565C0"/>

  <!-- ═══ RIDER ARMS ═══ -->
  <!-- Left arm -->
  <path d="M37 46 Q30 38 28 32" stroke="#1565C0" stroke-width="7"
        stroke-linecap="round" fill="none"/>
  <!-- Right arm -->
  <path d="M63 46 Q70 38 72 32" stroke="#1565C0" stroke-width="7"
        stroke-linecap="round" fill="none"/>
  <!-- Left glove -->
  <circle cx="27" cy="31" r="5" fill="#111"/>
  <!-- Right glove -->
  <circle cx="73" cy="31" r="5" fill="#111"/>

  <!-- ═══ HANDLEBAR ═══ -->
  <rect x="24" y="29" width="52" height="5" rx="2.5" fill="#212121"/>
  <!-- Grips -->
  <rect x="22" y="28" width="10" height="7" rx="3" fill="#111"/>
  <rect x="68" y="28" width="10" height="7" rx="3" fill="#111"/>
  <!-- Mirrors -->
  <rect x="13" y="25" width="11" height="4" rx="2" fill="#555"/>
  <rect x="76" y="25" width="11" height="4" rx="2" fill="#555"/>

  <!-- ═══ HELMET (top down) ═══ -->
  <ellipse cx="50" cy="38" rx="14" ry="13" fill="#D32F2F"/>
  <!-- Helmet shine -->
  <ellipse cx="45" cy="33" rx="5" ry="4" fill="white" opacity="0.12"/>
  <!-- Visor -->
  <path d="M38 43 Q50 48 62 43" stroke="#111" stroke-width="4"
        stroke-linecap="round" fill="none" opacity="0.75"/>

  <!-- ═══ FRONT SCOOTER BODY ═══ -->
  <path d="M42 28 Q42 18 50 16 Q58 18 58 28 Z" fill="#D32F2F"/>

  <!-- ═══ HEADLIGHT ═══ -->
  <ellipse cx="50" cy="16" rx="6" ry="3.5" fill="#FFF9C4"/>
  <ellipse cx="50" cy="16" rx="4" ry="2" fill="#FFEE58"/>

  <!-- ═══ FRONT WHEEL ═══ -->
  <ellipse cx="50" cy="8" rx="11" ry="4.5" fill="#1a1a1a"/>
  <ellipse cx="50" cy="8" rx="7" ry="3" fill="#333"/>
  <ellipse cx="50" cy="8" rx="3" ry="1.2" fill="#555"/>

</svg>
